  - aid: formant:formant-agent-sdk
    name: Formant Agent SDK
    description: >-
      Python client embedded in the `formant` PyPI package (`pip install formant`,
      `from formant.sdk.agent.v1 import Client`). Runs on-robot alongside the
      Formant agent and exposes typed ingestion methods — `post_image`,
      `post_numeric`, `post_numericset`, `post_bitset`, `post_text`,
      `post_geolocation`, `post_battery`, `post_json` — plus
      `register_command_request_callback` / `send_command_response` for
      bidirectional command handling and teleoperation hooks. Stream creation is
      implicit on first ingest. Use it when you are not on ROS and want to drive
      Formant from robot-side Python, or when you want finer-grained control than
      the ROS adapter provides.
    humanURL: https://docs.formant.io/reference/agent-sdk-installation-and-overview
    tags:
      - SDK
      - Agent
      - Python
      - Telemetry
    properties:
      - type: Documentation
        url: https://docs.formant.io/reference/agent-sdk-installation-and-overview
      - type: Documentation
        url: https://docs.formant.io/reference/agent-sdk-reference
      - type: Documentation
        url: https://docs.formant.io/reference/agent-sdk-protos
      - type: SDK
        url: https://pypi.org/project/formant/
  - aid: formant:formant-cloud-sdk
    name: Formant Cloud SDK
    description: >-
      Python client embedded in the `formant` PyPI package
      (`from formant.sdk.cloud.v1 import Client`). Wraps the Admin API for
      programmatic query and ingest of datapoints against your Formant
      organization without going through the agent. Authentication uses
      `FORMANT_EMAIL` / `FORMANT_PASSWORD` environment variables, or service
      account credentials generated via the web app or `fctl`.
    humanURL: https://docs.formant.io/reference/cloud-sdk-installation-and-overview
    tags:
      - SDK
      - Cloud
      - Python
      - Data Ingestion
      - Data Query
    properties:
      - type: Documentation
        url: https://docs.formant.io/reference/cloud-sdk-installation-and-overview
      - type: Documentation
        url: https://docs.formant.io/reference/cloud-sdk-reference
      - type: SDK
        url: https://pypi.org/project/formant/
  - aid: formant:formant-data-sdk
    name: Formant Data SDK (JavaScript / TypeScript)
    description: >-
      Browser- and Node-side JavaScript / TypeScript SDK for building custom
      modules, custom views, and embedded experiences against Formant's
      real-time and historical data planes. Powers the UI Toolkit, custom 3D
      viewer layers, real-time video modules, and intermodule communication.
      Reference implementations include FormantMobile (React Native),
      node-data-sdk (Node.js), realtime-sdk-template / -guide / -video-demo,
      view-embed-react-wrapper, and the broader FormantIO/toolkit meta-repo.
    humanURL: https://docs.formant.io/reference/data-sdk-1
    tags:
      - SDK
      - JavaScript
      - TypeScript
      - Realtime
      - Custom Modules
