aid: formant
name: Formant
description: >-
  Formant is a San Francisco–based robotics and physical-operations cloud
  platform that lets companies operate fleets of robots and advanced
  connected devices. The Formant software platform implements workflows for
  remote monitoring, intervention requests, data management, teleoperation,
  tech-support investigations, and business analysis, and exposes an
  extensible cloud infrastructure that can be built upon to create custom
  robot management experiences. The product surface spans an on-robot
  Formant Agent (ingesting telemetry from ROS / ROS2 / non-ROS sources via
  configurable adapters), a REST Admin API at `api.formant.io/v1/admin`, a
  Python package (`pip install formant`) that bundles both a Cloud SDK
  (query and ingest data programmatically) and an Agent SDK (post telemetry,
  handle commands, drive teleoperation from robot-side Python), a Data SDK
  for JavaScript/TypeScript that powers custom views, modules, and embedded
  experiences, the `fctl` command-line tool for SSH / SCP / port-forwarding
  over Formant's peer-to-peer connection, and Formant Metaphysics — an
  AI-powered incident-management layer that automates alarm triage,
  predictive maintenance, and SOP-driven investigations across SCADA,
  Snowflake, Slack, and Teams. The API is organized around devices, fleets,
  streams, views, commands, events, annotations, intervention requests,
  files, key-value storage, roles, users, schedules, analytics, and
  presence/online monitoring. Formant's GitHub organization (FormantIO)
  publishes the ROS / ROS2 adapter, a Boston Dynamics Spot adapter, an
  ONVIF camera adapter, a P2P adapter, Cradlepoint adapter, the Toolkit
  meta-repo for building on Formant APIs, the 3D viewer module, custom
  module boilerplate, Data SDK examples for Node.js and React Native, a
  Homebrew tap for `fctl`, and a public JSON-schema repo for module
  configuration.
